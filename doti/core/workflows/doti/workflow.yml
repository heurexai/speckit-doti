schemaVersion: 2
name: scaffold-dotnet-doti-bootstrap
maturity: command-aware-advisory
invocationStyle: slash-hyphen
# Stage model (schemaVersion 2): the doti cycle engine (Hx.Cycle.Core) reads `stages` for ordering,
# the artifact each stage `produces` ({feature} is the cycle's feature slug), and its `kind`
# (doc | review | diff | commit). Doc stages are bound by artifact hash and every stage by change-set
# identity.
stages:
  - id: specify
    command: doti-specify
    kind: doc
    produces: docs/specs/{feature}.md
    prereqs: []
  - id: clarify
    command: doti-clarify
    kind: doc
    produces: docs/specs/{feature}.md
    prereqs: [specify]
  - id: plan
    command: doti-plan
    kind: doc
    produces: docs/plans/{feature}-plan.md
    prereqs: [clarify]
  - id: tasks
    command: doti-tasks
    kind: doc
    produces: docs/tasks/{feature}-tasks.md
    prereqs: [plan]
  - id: analyze
    command: doti-analyze
    kind: review
    prereqs: [tasks]
  - id: arch-review
    command: doti-arch-review
    kind: review
    prereqs: [analyze]
  - id: implement
    command: doti-implement
    kind: diff
    prereqs: [arch-review]
  - id: drift-review
    command: doti-drift-review
    kind: review
    prereqs: [implement]
  - id: commit
    command: doti-commit
    kind: commit
    prereqs: [drift-review]
  - id: release
    command: doti-release
    kind: commit
    prereqs: [commit]
rules:
  commandAvailability: planned commands must be labeled unavailable until implemented
  deterministicProof: advisory checks are not gate proof
  runners: use dotnet-hosted tooling only; do not introduce shell runners
  handoff: record advisory checks, command-backed checks, and missing gates
