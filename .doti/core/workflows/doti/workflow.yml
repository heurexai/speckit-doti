schemaVersion: 2
name: scaffold-dotnet-doti-bootstrap
maturity: command-aware-advisory
invocationStyle: slash-hyphen
# Stage model (schemaVersion 2): the doti cycle engine (Hx.Cycle.Core) reads `stages` for ordering,
# the artifact each stage `produces` ({feature} is the numbered cycle feature slug, e.g. 001-short-name), and its `kind`
# (doc | review | diff | release). Doc/review stages are bound by artifact/prerequisite proof hashes;
# diff stages and stages that depend on diff stages are additionally bound to the current change-set
# identity. Stage commits are automatic transitions created when the next stage starts.
stages:
  - id: specify
    command: 01-doti-specify
    kind: doc
    produces: docs/specs/{feature}.md
    prereqs: []
  - id: clarify
    command: 02-doti-clarify
    kind: doc
    produces: docs/specs/{feature}.md
    prereqs: [specify]
  - id: plan
    command: 03-doti-plan
    kind: doc
    produces: docs/plans/{feature}-plan.md
    prereqs: [clarify]
  - id: tasks
    command: 04-doti-tasks
    kind: doc
    produces: docs/tasks/{feature}-tasks.md
    prereqs: [plan]
  - id: analyze
    command: 05-doti-analyze
    kind: review
    produces: docs/reviews/{feature}-analyze-report.md
    prereqs: [tasks]
  - id: arch-review
    command: 06-doti-arch-review
    kind: review
    produces: docs/reviews/{feature}-arch-review.md
    prereqs: [analyze]
  - id: implement
    command: 07-doti-implement
    kind: diff
    prereqs: [arch-review]
  - id: drift-review
    command: 08-doti-drift-review
    kind: review
    produces: docs/reviews/{feature}-drift-review.md
    prereqs: [implement]
    next: [release, specify]
  - id: release
    command: 09-doti-release
    kind: release
    prereqs: [drift-review]
rules:
  commandAvailability: planned commands must be labeled unavailable until implemented
  deterministicProof: advisory checks are not gate proof
  runners: use dotnet-hosted tooling only; do not introduce shell runners
  handoff: record advisory checks, command-backed checks, and missing gates
