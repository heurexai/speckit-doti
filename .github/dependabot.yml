version: 2
updates:
  # .NET NuGet dependencies (Central Package Management at the repo root).
  - package-ecosystem: nuget
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
