name: Release

# On a v* tag: build the standalone installer for each supported RID (win-x64 / linux-x64 / osx-arm64)
# on its native runner — a self-contained single-file hx + the bundled scaffold payload (template, doti,
# source, manifests, vendored grammars) + that RID's fetched tool binaries — and attach each archive
# (zip on Windows, tar.gz on linux/macOS) to a single GitHub Release.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" \
                 --title "speckit-doti ${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,  ext: zip,    exe: hx.exe }
          - { os: ubuntu-latest,  rid: linux-x64, ext: tar.gz, exe: hx }
          - { os: macos-latest,   rid: osx-arm64, ext: tar.gz, exe: hx }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build scaffold-dotnet.slnx -c Release

      - name: Fetch vendored tool binaries for ${{ matrix.rid }}
        run: dotnet run --project tools/Hx.Runner.Cli -c Release --no-build -- tools fetch --repo . --json

      - name: Publish hx (self-contained, single file)
        run: dotnet publish tools/Hx.Scaffold.Cli -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Assemble installer (Windows zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $name = "speckit-doti-$($env:GITHUB_REF_NAME)-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force $name | Out-Null
          git archive --format=tar HEAD | tar -x -C $name
          foreach ($t in 'gitleaks','sentrux','gitversion') { if (Test-Path "tools/$t/bin") { Copy-Item -Recurse -Force "tools/$t/bin" "$name/tools/$t/bin" } }
          Copy-Item "publish/Hx.Scaffold.Cli.exe" "$name/${{ matrix.exe }}"
          Compress-Archive -Path "$name/*" -DestinationPath "$name.${{ matrix.ext }}" -Force
          $hash = (Get-FileHash "$name.${{ matrix.ext }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $name.${{ matrix.ext }}" | Out-File -Encoding ascii -NoNewline "$name.${{ matrix.ext }}.sha256"
          "ASSET=$name.${{ matrix.ext }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM=$name.${{ matrix.ext }}.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Assemble installer (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="speckit-doti-${GITHUB_REF_NAME}-${{ matrix.rid }}"
          mkdir -p "$name"
          git archive --format=tar HEAD | tar -x -C "$name"
          for t in gitleaks sentrux gitversion; do [ -d "tools/$t/bin" ] && cp -R "tools/$t/bin" "$name/tools/$t/bin"; done
          cp "publish/Hx.Scaffold.Cli" "$name/${{ matrix.exe }}"
          chmod +x "$name/${{ matrix.exe }}"
          tar czf "$name.${{ matrix.ext }}" -C "$name" .
          sha256sum "$name.${{ matrix.ext }}" > "$name.${{ matrix.ext }}.sha256"
          echo "ASSET=$name.${{ matrix.ext }}" >> "$GITHUB_ENV"
          echo "CHECKSUM=$name.${{ matrix.ext }}.sha256" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.rid }} archive to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET }}" "${{ env.CHECKSUM }}" --repo "${{ github.repository }}" --clobber
