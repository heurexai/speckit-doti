name: Release

# On a v* tag: build the standalone win-x64 installer (self-contained hx.exe + the bundled scaffold
# payload, incl. the vendored tool binaries) and publish it as a GitHub Release asset.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: build + publish win-x64 installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build scaffold-dotnet.slnx -c Release

      - name: Fetch vendored tool binaries (win-x64)
        run: dotnet run --project tools/Hx.Runner.Cli -c Release --no-build -- tools fetch --repo . --json

      - name: Publish hx (self-contained, single file)
        run: dotnet publish tools/Hx.Scaffold.Cli -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Assemble the installer
        shell: pwsh
        run: |
          $name = "speckit-doti-$($env:GITHUB_REF_NAME)-win-x64"
          New-Item -ItemType Directory -Force $name | Out-Null
          # Clean, tracked payload (template + doti + source projects + manifests + configs; no bin/obj/.git).
          git archive --format=tar HEAD | tar -x -C $name
          # Overlay the fetched, gitignored tool binaries so the install is fully offline.
          # (The sentrux grammar is vendored in-repo, so git archive already placed it in the payload.)
          Copy-Item -Recurse -Force tools/gitleaks/bin   "$name/tools/gitleaks/bin"
          Copy-Item -Recurse -Force tools/sentrux/bin    "$name/tools/sentrux/bin"
          Copy-Item -Recurse -Force tools/gitversion/bin "$name/tools/gitversion/bin"
          # The standalone launcher sits at the payload root, so AppContext.BaseDirectory finds the marker.
          Copy-Item publish/Hx.Scaffold.Cli.exe "$name/hx.exe"
          Compress-Archive -Path "$name/*" -DestinationPath "$name.zip" -Force
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME "$env:ASSET" --title "speckit-doti $env:GITHUB_REF_NAME" --generate-notes
