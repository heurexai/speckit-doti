name: Release

# On a v* tag: build hx for each supported RID, package it with Velopack, and attach only
# Velopack installer/update artifacts plus checksums/identity metadata to the GitHub Release.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" \
                 --title "speckit-doti ${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,  channel: win, exe: hx.exe }
          - { os: ubuntu-latest,  rid: linux-x64, channel: linux, exe: hx }
          - { os: macos-latest,   rid: osx-arm64, channel: osx, exe: hx }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build scaffold-dotnet.slnx -c Release

      - name: Fetch vendored tool binaries for ${{ matrix.rid }}
        run: dotnet run --project tools/Hx.Runner.Cli -c Release --no-build -- tools fetch --repo . --rid ${{ matrix.rid }} --json

      - name: Publish hx (self-contained, single file)
        run: dotnet publish tools/Hx.Scaffold.Cli -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Verify hx version matches release tag (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $expected = "${{ github.ref_name }}".TrimStart("v")
          $actual = (& "publish/Hx.Scaffold.Cli.exe" --version).Trim()
          if ($actual -ne $expected) {
            throw "hx version '$actual' does not match release tag version '$expected'."
          }

      - name: Verify hx version matches release tag (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          actual="$(publish/Hx.Scaffold.Cli --version | tr -d '\r\n')"
          if [ "$actual" != "$expected" ]; then
            echo "hx version '$actual' does not match release tag version '$expected'." >&2
            exit 1
          fi

      - name: Stage Velopack payload (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vpk-payload | Out-Null
          Copy-Item "publish/Hx.Scaffold.Cli.exe" "vpk-payload/${{ matrix.exe }}"
          Copy-Item -Recurse -Force ".doti" "vpk-payload/.doti"
          foreach ($t in 'gitleaks','sentrux','gitversion') {
            if (Test-Path "tools/$t/bin/${{ matrix.rid }}") {
              New-Item -ItemType Directory -Force "vpk-payload/tools/$t/bin" | Out-Null
              Copy-Item -Recurse -Force "tools/$t/bin/${{ matrix.rid }}" "vpk-payload/tools/$t/bin/${{ matrix.rid }}"
            }
          }

      - name: Stage Velopack payload (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vpk-payload
          cp "publish/Hx.Scaffold.Cli" "vpk-payload/${{ matrix.exe }}"
          chmod +x "vpk-payload/${{ matrix.exe }}"
          cp -R ".doti" "vpk-payload/.doti"
          for t in gitleaks sentrux gitversion; do
            if [ -d "tools/$t/bin/${{ matrix.rid }}" ]; then
              mkdir -p "vpk-payload/tools/$t/bin"
              cp -R "tools/$t/bin/${{ matrix.rid }}" "vpk-payload/tools/$t/bin/${{ matrix.rid }}"
            fi
          done

      - name: Package Velopack artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $vpkPackage = Get-ChildItem -LiteralPath "tools/velopack/bin/${{ matrix.rid }}" -Filter "vpk*.nupkg" | Select-Object -First 1
          if (-not $vpkPackage) { throw "Pinned Velopack CLI package missing for ${{ matrix.rid }}." }
          $extract = Join-Path $env:RUNNER_TEMP "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force $extract | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($vpkPackage.FullName, $extract, $true)
          $vpkDll = Get-ChildItem -LiteralPath $extract -Recurse -Filter vpk.dll | Select-Object -First 1
          if (-not $vpkDll) { throw "Pinned Velopack CLI package did not contain vpk.dll." }
          New-Item -ItemType Directory -Force "release-artifacts" | Out-Null
          dotnet $vpkDll.FullName pack `
            --packId speckit-doti `
            --packVersion $version `
            --packDir vpk-payload `
            --mainExe "${{ matrix.exe }}" `
            --packTitle "speckit-doti" `
            --channel "${{ matrix.channel }}" `
            --runtime "${{ matrix.rid }}" `
            --outputDir release-artifacts
          $files = Get-ChildItem -LiteralPath release-artifacts -File
          if (-not $files) { throw "Velopack produced no release artifacts." }
          $identity = [ordered]@{
            schemaVersion = 1
            projectName = "speckit-doti"
            version = $version
            runtimeIdentifier = "${{ matrix.rid }}"
            channel = "${{ matrix.channel }}"
            sourceCommit = "${{ github.sha }}"
            releaseProduct = "velopack"
            sourceArchiveExcluded = $true
            artifacts = @(Get-ChildItem -LiteralPath release-artifacts -File | ForEach-Object {
              [ordered]@{ name = $_.Name; sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant(); sizeBytes = $_.Length }
            })
          }
          $identity | ConvertTo-Json -Depth 6 | Out-File -Encoding utf8 "release-artifacts/release.identity.${{ matrix.rid }}.json"
          foreach ($file in Get-ChildItem -LiteralPath release-artifacts -File | Where-Object { $_.Name -notlike "*.sha256" }) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)" | Out-File -Encoding ascii -NoNewline "$($file.FullName).sha256"
          }

      - name: Upload ${{ matrix.rid }} Velopack artifacts to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release upload "${{ github.ref_name }}" (Get-ChildItem -LiteralPath release-artifacts -File | ForEach-Object { $_.FullName }) --repo "${{ github.repository }}" --clobber
