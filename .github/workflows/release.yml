name: Release

# 007 T024 — publish the framework-dependent .NET global tool `Heurex.SpeckitDoti` to public NuGet.org via
# Trusted Publishing (GitHub OIDC; NO stored API key). One package for all OSes — per-RID tool binaries are
# fetched + hash-verified on demand (T022), not bundled. Velopack/vpk staging is gone (T016/T017).
#
# H10 hardening implemented here:
#   * `id-token: write` is on the PUBLISH job ONLY (this workflow declares no workflow-level write permission).
#   * The publish job runs in the protected `production` Environment (matching the NuGet policy's Environment
#     field) — a required reviewer gates OIDC issuance, so a
#     token is never minted on just any collaborator's tag push.
#   * Trusted Publishing is the ONLY credential path — there is no fallback stored NUGET_API_KEY anywhere.
#
# H10 + T024 OPERATOR PREP (one-time, before the first publish):
#   1. NuGet.org: create a Trusted Publishing policy (owner `heurexai`, repo `speckit-doti`, workflow `release.yml`).
#   2. Add the `NUGET_USER` repo secret = the nuget.org username (NOT the email).
#   3. Configure the `production` Environment with a required reviewer (its name MUST equal the policy's Environment field).
#   4. Actions below are pinned to full commit SHAs (resolved 2026-06-27 via the GitHub API). The trailing
#      `# vN` comment records the floating tag each SHA was resolved from; re-pin when bumping a version.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

jobs:
  pack-and-smoke:
    name: Pack the global tool + source-free install smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4 (pinned 2026-06-27)
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9   # v4 (pinned 2026-06-27)
        with:
          global-json-file: global.json

      - name: Pack Heurex.SpeckitDoti (framework-dependent global tool)
        # PackageOutputPath MUST be absolute: MSBuild resolves a relative path against the PROJECT directory
        # (tools/Hx.Scaffold.Cli/), not the repo root — so a bare `artifacts/nuget` lands beside the csproj and the
        # smoke/upload/publish steps (which read repo-root artifacts/nuget) cannot find the package.
        run: dotnet build tools/Hx.Scaffold.Cli/Hx.Scaffold.Cli.csproj -c Release -t:PackAnchoredTool -p:PackageOutputPath="$GITHUB_WORKSPACE/artifacts/nuget" --nologo

      - name: Source-free install smoke (installed hx; no source checkout on PATH)
        shell: bash
        run: |
          set -euo pipefail
          nupkg="$(ls artifacts/nuget/Heurex.SpeckitDoti.*.nupkg)"
          version="$(basename "$nupkg" | sed -E 's/Heurex\.SpeckitDoti\.(.*)\.nupkg/\1/')"
          tools="$RUNNER_TEMP/hx-tools"; gen="$RUNNER_TEMP/hx-gen"
          dotnet tool install Heurex.SpeckitDoti --version "$version" --add-source artifacts/nuget --tool-path "$tools"
          export PATH="$tools:$PATH"
          # The documented source-free command path — each must return the CliResult envelope + exit 0.
          hx --help
          hx version --json
          hx prereq check --json
          hx new --name HxRtSmoke --output "$gen" --company Smoke --agents codex,claude --json
          hx doti install --repo "$gen" --json
          # The scaffolded repo must carry NO Velopack stub and NOT vendor the runner CLI source (FR-045/T021/T042).
          ! grep -rq "VelopackApp" "$gen" || { echo "generated repo carries a Velopack stub"; exit 1; }
          ! test -d "$gen/tools/Hx.Runner.Cli" || { echo "generated repo vendored the runner CLI source"; exit 1; }

      - name: Upload the tool package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4 (pinned 2026-06-27)
        with:
          name: nuget
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org (Trusted Publishing)
    needs: pack-and-smoke
    runs-on: ubuntu-latest
    environment: production     # MUST match the NuGet Trusted Publishing policy's Environment field; add a required reviewer to gate OIDC issuance (H10)
    permissions:
      id-token: write           # OIDC — ONLY on this job
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093   # v4 (pinned 2026-06-27)
        with:
          name: nuget
          path: artifacts/nuget
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9   # v4 (pinned 2026-06-27)
        with:
          global-json-file: global.json

      - name: NuGet login (OIDC -> short-lived API key)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841   # v1 (pinned 2026-06-27)
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push Heurex.SpeckitDoti to NuGet.org
        run: dotnet nuget push artifacts/nuget/Heurex.SpeckitDoti.*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
