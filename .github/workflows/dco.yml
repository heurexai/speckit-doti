name: DCO

# Verifies every non-merge commit in a PR carries a Signed-off-by line that
# matches the commit author or committer (the Developer Certificate of Origin).
# Contributors sign off with `git commit -s`. See CONTRIBUTING.md and ./DCO.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  dco:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7 (pinned 2026-06-27)
        with:
          fetch-depth: 0
      - name: Check sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Automated dependency PRs (Dependabot) are not signed off; don't block them.
          if [ "${GITHUB_ACTOR:-}" = "dependabot[bot]" ]; then
            echo "Actor is dependabot[bot]; sign-off not required for automated dependency PRs."
            exit 0
          fi
          fail=0
          for c in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            # Skip merge commits (more than one parent).
            if [ "$(git rev-list --parents -n1 "$c" | wc -w)" -gt 2 ]; then
              continue
            fi
            subject="$(git show -s --format='%s' "$c")"
            author_email="$(git show -s --format='%ae' "$c")"
            committer_email="$(git show -s --format='%ce' "$c")"
            sob="$(git show -s --format='%B' "$c" | grep -iE '^Signed-off-by: .+ <[^>]+>' || true)"
            if [ -z "$sob" ]; then
              echo "::error::Missing Signed-off-by on $c — \"$subject\". Fix with: git commit -s (or git rebase --signoff main)."
              fail=1
              continue
            fi
            if ! echo "$sob" | grep -qiF "<$author_email>" && ! echo "$sob" | grep -qiF "<$committer_email>"; then
              echo "::error::Signed-off-by does not match the author/committer email on $c — \"$subject\"."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "DCO check failed. See https://developercertificate.org/ and CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits are signed off."
