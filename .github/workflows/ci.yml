name: CI

# PR gate: restore, build, and run the full test suite on Windows, Linux, and macOS.
# The suite includes the ArchUnitNET architecture families (layering/boundary violations
# fail the build). Heavy end-to-end smokes (template round-trip, scaffold-new) are env-gated
# and skipped here.
#
# The full `gate run` (hygiene, Gitleaks secret scan, Sentrux boundary analysis, security SCA,
# GitVersion) still needs the vendored win-x64 tool binaries + Sentrux grammar (operational),
# so it is not part of CI yet.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7 (pinned 2026-06-27)
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1   # v5 (pinned 2026-06-27)
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore scaffold-dotnet.slnx
      - name: Build (Release)
        run: dotnet build scaffold-dotnet.slnx -c Release --no-restore
      - name: Test
        run: dotnet test scaffold-dotnet.slnx -c Release --no-build
