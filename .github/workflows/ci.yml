name: CI

# The PR gate. Restores, builds, and runs the full test suite — which includes
# the ArchUnitNET architecture families, so layering/boundary violations fail the
# build. This needs no vendored tool binaries (ArchUnitNET is a NuGet package).
#
# NOTE: the full `gate run` (hygiene, Gitleaks secret scan, Sentrux boundary
# analysis, security SCA, GitVersion) additionally needs the vendored win-x64
# tool binaries + the Sentrux grammar, fetched operationally per tools/*/*.version.json.
# Those steps run locally today; add them here once cross-platform tool vendoring
# lands (see the README "Status"). Runs on a Windows runner because the vendored
# tooling is win-x64.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test:
    name: build + architecture & unit tests (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore scaffold-dotnet.slnx
      - name: Build (Release)
        run: dotnet build scaffold-dotnet.slnx -c Release --no-restore
      - name: Test (unit + ArchUnitNET architecture families)
        run: dotnet test scaffold-dotnet.slnx -c Release --no-build
