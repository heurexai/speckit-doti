name: Store release

# Manual: build the MSIX (self-contained hx + payload + win-x64 tools) and submit it to the
# Microsoft Store. The FIRST submission must be completed manually in Partner Center (listing,
# age rating); this automates subsequent version submissions. Requires the repo secrets
# STORE_TENANT_ID / STORE_SELLER_ID / STORE_CLIENT_ID / STORE_CLIENT_SECRET (the linked Azure AD app).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package + submit, e.g. 0.2.0 (MSIX version becomes <version>.0)"
        required: true

permissions:
  contents: read

jobs:
  msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build scaffold-dotnet.slnx -c Release

      - name: Fetch vendored tool binaries (win-x64)
        run: dotnet run --project tools/Hx.Runner.Cli -c Release --no-build -- tools fetch --repo . --json

      - name: Publish hx (self-contained, single file)
        run: dotnet publish tools/Hx.Scaffold.Cli -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Verify hx version matches MSIX version
        shell: pwsh
        run: |
          $expected = "${{ inputs.version }}"
          $actual = (& "publish/Hx.Scaffold.Cli.exe" --version).Trim()
          if ($actual -ne $expected) {
            throw "hx version '$actual' does not match MSIX version '$expected'. Run this workflow from the matching release tag/ref."
          }

      - name: Assemble MSIX layout
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}"
          $layout = "msix-layout"
          New-Item -ItemType Directory -Force $layout | Out-Null
          # Payload (template, doti, source, manifests, vendored grammars) + win-x64 tool binaries + hx.
          git archive --format=tar HEAD | tar -x -C $layout
          foreach ($t in 'gitleaks','sentrux','gitversion') { if (Test-Path "tools/$t/bin") { Copy-Item -Recurse -Force "tools/$t/bin" "$layout/tools/$t/bin" } }
          Copy-Item publish/Hx.Scaffold.Cli.exe "$layout/hx.exe"
          Copy-Item packaging/msix/AppxManifest.xml "$layout/AppxManifest.xml"
          New-Item -ItemType Directory -Force "$layout/Assets" | Out-Null
          Copy-Item packaging/msix/Assets/* "$layout/Assets/"
          # Stamp the Identity version (4-part; last part 0 for the Store). Anchor to the start of the line so
          # MinVersion/MaxVersionTested (10.0.x, on the TargetDeviceFamily line) are never rewritten.
          (Get-Content "$layout/AppxManifest.xml") -replace '^(\s*)Version="[0-9.]+"', "`${1}Version=`"$ver.0`"" | Set-Content -Encoding utf8 "$layout/AppxManifest.xml"

      - name: Pack MSIX (makeappx)
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Directory |
                   Where-Object { Test-Path "$($_.FullName)/x64/makeappx.exe" } |
                   Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "makeappx.exe not found in the Windows SDK." }
          & "$($sdk.FullName)/x64/makeappx.exe" pack /d msix-layout /p "speckit-doti-${{ inputs.version }}.msix" /o

      # Subsequent-version submission via the Microsoft Store Developer CLI. The first submission
      # (listing + age rating) is manual in Partner Center. NOTE: the MSStore CLI is NOT a dotnet/NuGet
      # tool — it is installed via the official setup action below (winget locally). Verify the exact
      # `publish` invocation on the first automated run: https://aka.ms/msstoredevcli
      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Submit to the Microsoft Store
        shell: pwsh
        env:
          STORE_TENANT_ID: ${{ secrets.STORE_TENANT_ID }}
          STORE_SELLER_ID: ${{ secrets.STORE_SELLER_ID }}
          STORE_CLIENT_ID: ${{ secrets.STORE_CLIENT_ID }}
          STORE_CLIENT_SECRET: ${{ secrets.STORE_CLIENT_SECRET }}
        run: |
          msstore reconfigure --tenantId $env:STORE_TENANT_ID --sellerId $env:STORE_SELLER_ID --clientId $env:STORE_CLIENT_ID --clientSecret $env:STORE_CLIENT_SECRET
          msstore publish "speckit-doti-${{ inputs.version }}.msix" --appId 9P4FZG3SQ890
