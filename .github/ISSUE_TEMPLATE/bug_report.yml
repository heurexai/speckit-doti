name: Bug report
description: Report a reproducible problem in speckit-doti.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Do not include secrets, private repository content, or security-sensitive details here. For vulnerabilities, follow SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List the exact commands or actions needed to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include command output when useful.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scaffold generation
        - doti workflow
        - gate or hygiene
        - architecture tests
        - templates
        - documentation
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release, branch, or commit where you saw the issue.
      placeholder: main at abc1234
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, Ubuntu 24.04, macOS 15
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version
      placeholder: dotnet --version
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add logs, screenshots, or links that help explain the issue.

